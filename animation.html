<script>
document.querySelectorAll('[data-preview-card]').forEach((card) => {
  const iframe = card.querySelector('[data-preview-embed]');
  if (!iframe) return;

  const startPreview = () => {
    const src = iframe.getAttribute('data-preview-src');
    if (src && iframe.getAttribute('src') !== src) {
      iframe.setAttribute('src', src);
    }
    card.classList.add('is-preview-playing');
  };

  const stopPreview = () => {
    card.classList.remove('is-preview-playing');
    if (iframe.hasAttribute('src')) {
      iframe.removeAttribute('src');
    }
  };

  card.addEventListener('mouseenter', startPreview);
  card.addEventListener('mouseleave', stopPreview);
  card.addEventListener('focusin', startPreview);
  card.addEventListener('focusout', stopPreview);
});
</script></body>
